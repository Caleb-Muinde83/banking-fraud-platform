version: '3.8'

services:

  # =========================
  # PostgreSQL (CDC Source)
  # =========================
  postgres:
    image: postgres:15-alpine
    container_name: bank_postgres
    command:
      - postgres
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped


  # =========================
  # Kafka (KRaft Mode)
  # =========================
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: bank_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    restart: unless-stopped


  # =========================
  # Kafka Connect (Debezium)
  # =========================
  connect:
    image: debezium/connect:2.4
    container_name: bank_connect
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    restart: unless-stopped


  # =========================
  # Schema Registry
  # =========================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: bank_schema_registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    restart: unless-stopped


  # =========================
  # Flink JobManager (UI)
  # =========================
  flink-jobmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: bank_flink_jobmanager
    ports:
      - "8082:8081"   # Flink UI (avoids Schema Registry conflict)
    command: jobmanager
    depends_on:
      - kafka
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    restart: unless-stopped


  # =========================
  # Flink TaskManager (Workers)
  # =========================
  flink-taskmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: bank_flink_taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    restart: unless-stopped


  # =========================
  # Kafka Topic Bootstrapper
  # =========================
  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: bank_kafka_init
    depends_on:
      - kafka
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo 'Waiting for Kafka broker availability...'
        until kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1; do
          sleep 5
        done

        echo 'Provisioning Platform Topics...'

        topics="
        api_requests
        dead_letter_queue
        fraud_alerts
        risk_scores
        enriched_transactions
        model_features
        "

        for topic in $$topics; do
          kafka-topics \
            --bootstrap-server kafka:29092 \
            --create \
            --if-not-exists \
            --topic $$topic \
            --partitions 3 \
            --replication-factor 1
        done

        echo 'Verifying topics...'
        kafka-topics --bootstrap-server kafka:29092 --list

        echo 'Bootstrap complete.'
    restart: "no"


volumes:
  postgres_data: