services:

  # =========================
  # PostgreSQL (CDC Source)
  # =========================
  postgres:
    image: postgres:15-alpine
    container_name: bank_postgres
    command:
      - postgres
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - F:/DaTech-kafka/banking-fraud-platform/persisted-volumes/postgres:/var/lib/postgresql/data
    restart: unless-stopped


  # =========================
  # Kafka (KRaft Mode)
  # =========================
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: bank_kafka
    ports:
      - "29092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    restart: unless-stopped


  # =========================
  # Kafka Connect (Debezium)
  # =========================
  connect:
    image: debezium/connect:2.4
    container_name: bank_connect
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    restart: unless-stopped


  # =========================
  # Schema Registry
  # =========================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: bank_schema_registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    restart: unless-stopped

  # =========================
  # Kafka Connect Bootstrapper
  # =========================
  connect-init:
    image: curlimages/curl:latest
    container_name: bank_connect_init
    depends_on:
      - kafka
      - connect
    volumes:
      - ./debezium-postgres-connector.json:/tmp/debezium-postgres-connector.json:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo 'Waiting for Kafka Connect availability...'
        until curl -fs http://connect:8083/connectors >/dev/null 2>&1; do
          sleep 5
        done

        echo 'Registering Debezium connector if missing...'
        if curl -s -o /dev/null -w '%{http_code}' http://connect:8083/connectors/banking-cdc-connector | grep -q '^200$'; then
          echo 'Connector already registered.'
          exit 0
        fi

        curl -s -X POST \
          -H 'Content-Type: application/json' \
          --data @/tmp/debezium-postgres-connector.json \
          http://connect:8083/connectors

        echo 'Connector registration complete.'
    restart: "no"


  # =========================
  # Flink JobManager (UI)
  # =========================
  flink-jobmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: bank_flink_jobmanager
    ports:
      - "8082:8081"
    command: jobmanager
    depends_on:
      - kafka
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    restart: unless-stopped


  # =========================
  # Flink TaskManager (Workers)
  # =========================
  flink-taskmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: bank_flink_taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    restart: unless-stopped


  # =========================
  # Kafka Topic Bootstrapper
  # =========================
  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: bank_kafka_init
    depends_on:
      - kafka
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo 'Waiting for Kafka broker availability...'
        until kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1; do
          sleep 5
        done

        echo 'Provisioning Platform Topics...'

        topics="
        api_requests
        dead_letter_queue
        fraud_alerts
        critical_alerts
        risk_scores
        enriched_transactions
        model_features
        banking.login_events
        banking.sessions
        banking.accounts
        banking.transactions
        banking.beneficiaries
        banking.employee_actions
        banking.unified_timeline
        "

        for topic in $$topics; do
          kafka-topics \
            --bootstrap-server kafka:29092 \
            --create \
            --if-not-exists \
            --topic $$topic \
            --partitions 3 \
            --replication-factor 1
        done

        echo 'Verifying topics...'
        kafka-topics --bootstrap-server kafka:29092 --list

        echo 'Bootstrap complete.'
    restart: "no"

  # =========================================================================
  # OpenSearch (Search, Analytics & Threat Hunting)
  # =========================================================================
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: bank_opensearch
    environment:
      - cluster.name=bank-threat-hunting
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m" 
      - DISABLE_SECURITY_PLUGIN=true               
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - F:/DaTech-kafka/banking-fraud-platform/persisted-volumes/opensearch:/usr/share/opensearch/data
    restart: unless-stopped

  # =========================================================================
  # OpenSearch Dashboards (The Query/Visualization Web UI)
  # =========================================================================
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: bank_opensearch_dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_PLUGIN=true
    depends_on:
      - opensearch
    restart: unless-stopped