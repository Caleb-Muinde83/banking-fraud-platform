name: Deploy Banking Fraud Platform

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "backend/**"
      - "simulator/**"
      - "config/**"
      - "infra/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Build Banking API Local Image
        # Notice we changed '.' to './api' 
        run: docker build -t banking-api:latest ./api

      - name: Build Threat Simulator Local Image
        # Notice we changed '.' to './simulator'
        run: docker build -t banking-simulator:latest ./simulator

      - name: Deploy Orchestration Stack to Swarm
        run: docker stack deploy -c infra/docker-compose.yml fraud_platform

      - name: Wait for Kafka Connect Initialization
        run: |
          echo "Waiting for Kafka Connect REST API to be fully ready..."

          # Poll Kafka Connect every 10 seconds for up to 3 minutes
          for i in {1..18}; do
            if curl -s -f http://127.0.0.1:8083/connectors > /dev/null; then
              echo "✅✅ Kafka Connect is UP and ready!"
              break
            fi

            echo "Waiting for Kafka Connect... (attempt $i/18)"
            sleep 10
          done

          # Fail the workflow if Kafka Connect never became available
          if ! curl -s -f http://127.0.0.1:8083/connectors > /dev/null; then
            echo "❌❌❌ Kafka Connect failed to become ready within 3 minutes."
            exit 1
          fi