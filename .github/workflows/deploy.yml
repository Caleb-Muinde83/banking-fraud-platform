name: Deploy Banking Fraud Platform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  # Executes directly on your k3s-master laptop via Tailscale
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      # Paths are now relative to the repository root
      - name: Build Banking API Local Image
        run: |
          cd api
          docker build -t banking-api:latest .

      - name: Build Threat Simulator Local Image
        run: |
          cd simulator
          docker build -t banking-simulator:latest .

      - name: Deploy Orchestration Stack to Swarm
        run: |
          cd infra
          docker stack deploy -c docker-compose.yml fraud_platform

      - name: Cool Down for Service Standup
        run: sleep 40

      - name: Establish Debezium Engine Event Source
        run: |
          cd config/kafka-connect
          curl -X POST -H "Content-Type: application/json" \
            --data @postgres-source.json \
            http://localhost:8083/connectors || echo "Connector configuration already active"
